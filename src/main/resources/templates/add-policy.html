<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Add Policy</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <h2>Add Policy</h2>

    <form th:action="@{/policies/save}"
          method="post">

        <input class="form-control mb-3"
               name="customerName"
               placeholder="Customer Name">

        <input class="form-control mb-3"
               name="customerEmail"
               placeholder="Customer Email">

        <input class="form-control mb-3"
               name="customerMobile"
               placeholder="Customer Mobile">

        <div class="mb-3">

            <label class="form-label">
                Policy Type
            </label>

            <select class="form-control"
                    name="policyType"
                    required>

                <option value="">
                    Select Policy Type
                </option>

                <option value="CAR">
                    Car Insurance
                </option>

                <option value="HEALTH">
                    Health Insurance
                </option>

                <option value="LIFE">
                    Life Insurance
                </option>

                <option value="BIKE">
                    Bike Insurance
                </option>

                <option value="HOME">
                    Home Insurance
                </option>

                <option value="TRAVEL">
                    Travel Insurance
                </option>

            </select>

        </div>

        <input class="form-control mb-3"
               name="companyName"
               placeholder="Company Name">

        <input class="form-control mb-3"
               name="policyNumber"
               placeholder="Policy Number">

        <input class="form-control mb-3"
               type="date"
               name="startDate">

        <input class="form-control mb-3"
               type="date"
               name="expiryDate">

        <input class="form-control mb-3"
               type="number"
               step="0.01"
               min="0"
               name="premiumAmount"
               placeholder="Premium Amount"
               required>

        <textarea class="form-control mb-3"
                  name="notes"
                  rows="4"
                  placeholder="Policy Notes"></textarea>

        <button class="btn btn-success">
            Save Policy
        </button>

    </form>

</div>

</body>
</html>
