<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Reminder History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <h2>Reminder History</h2>

    <table class="table table-bordered">

        <thead>

        <tr>

            <th>Policy</th>
            <th>Agent</th>
            <th>Type</th>
            <th>Status</th>
            <th>Sent At</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="r : ${reminders}">

            <td th:text="${r.policy.policyNumber}"></td>

            <td th:text="${r.agent.email}"></td>

            <td th:text="${r.reminderType}"></td>

            <td th:text="${r.emailStatus}"></td>

            <td th:text="${r.sentAt}"></td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
