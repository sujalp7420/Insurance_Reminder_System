<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Policy List</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Custom CSS -->
    <style>

        body{
            background:linear-gradient(
                    135deg,
                    #0f172a,
                    #1e293b);
            min-height:100vh;
        }

        .page-title{
            color:white;
            font-weight:700;
        }

        .card-custom{
            background:white;
            padding:25px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.25);
        }

        .table{
            border-radius:15px;
            overflow:hidden;
        }

        .btn-primary{
            background:linear-gradient(
                    45deg,
                    #2563eb,
                    #06b6d4);
            border:none;
        }

        .btn-success{
            border:none;
        }

        .btn{
            border-radius:10px;
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-2px);
        }

        .input-group input{
            border-radius:10px 0 0 10px;
        }

        .input-group button{
            border-radius:0 10px 10px 0;
        }

        thead{
            font-size:15px;
        }

    </style>

</head>

<body>

<div class="container mt-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="page-title">
            Policy List
        </h2>

        <a th:href="@{/policies/add}"
           class="btn btn-primary">

            <i class="bi bi-plus-circle"></i>
            Add Policy

        </a>

    </div>

    <div class="card-custom">

        <!-- Search Form -->
        <form th:action="@{/policies/search}"
              method="get"
              class="mb-4">

            <div class="input-group">

                <input type="text"
                       class="form-control"
                       placeholder="Search Policy Number / Customer Name"
                       name="keyword">

                <button type="submit"
                        class="btn btn-primary">
                    Search
                </button>

            </div>

        </form>

        <!-- Policy Table -->
        <table class="table table-bordered table-striped table-hover">

            <thead class="table-dark">

            <tr>
                <th>Customer</th>
                <th>Mobile</th>
                <th>Company</th>
                <th>Policy Number</th>
                <th>Expiry Date</th>
                <th>Status</th>
                <th width="420">Actions</th>
            </tr>

            </thead>

            <tbody>

            <!-- Show Policies -->
            <tr th:each="p : ${policies}">

                <td th:text="${p.customerName}">
                </td>

                <td th:text="${p.customerMobile}">
                </td>

                <td th:text="${p.companyName}">
                </td>

                <td th:text="${p.policyNumber}">
                    Policy Number
                </td>

                <td th:text="${p.expiryDate}">
                    Expiry Date
                </td>

                <td th:text="${p.status}">
                    Status
                </td>

                <td>

                    <!-- Renew & Delete -->
                    <div class="mb-2">

                        <a th:href="@{/policies/renew/{id}(id=${p.id})}"
                           class="btn btn-success btn-sm">
                            <i class="bi bi-arrow-repeat"></i>
                            Renew
                        </a>

                        <a th:href="@{/policies/delete/{id}(id=${p.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this policy?');">
                            <i class="bi bi-trash"></i>
                            Delete
                        </a>

                    </div>

                    <!-- Upload PDF -->
                    <form th:action="@{'/policies/upload/' + ${p.id}}"
                          method="post"
                          enctype="multipart/form-data">

                        <div class="input-group input-group-sm">

                            <input type="file"
                                   name="file"
                                   class="form-control"
                                   accept=".pdf">

                            <button type="submit"
                                    class="btn btn-info">
                                Upload PDF
                            </button>

                        </div>

                    </form>

                    <!-- Download PDF -->
                    <div class="mt-2">

                        <a th:if="${p.documentPath != null}"
                           th:href="@{'/policies/download/' + ${p.id}}"
                           class="btn btn-primary btn-sm">

                            Download PDF

                        </a>

                    </div>

                </td>

            </tr>

            <!-- No Policies -->
            <tr th:if="${#lists.isEmpty(policies)}">

                <td colspan="6"
                    class="text-center text-danger fw-bold">

                    No Policies Found

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
