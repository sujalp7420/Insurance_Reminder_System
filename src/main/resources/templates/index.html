<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card">

                <div class="card-body">

                    <h3 class="text-center mb-4">
                        Agent Login
                    </h3>

                    <form th:action="@{/login}"
                          method="post">

                        <div class="mb-3">

                            <label>Email</label>

                            <input
                                    type="email"
                                    name="username"
                                    class="form-control"
                                    required>

                        </div>

                        <div class="mb-3">

                            <label>Password</label>

                            <input
                                    type="password"
                                    name="password"
                                    class="form-control"
                                    required>

                        </div>

                        <button
                                class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                    <div class="mt-3 text-center">

                        <a th:href="@{/register}">
                            Create Account
                        </a>

                    </div>

                    <div
                            class="alert alert-danger mt-3"
                            th:if="${param.error}">

                        Invalid Credentials

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
