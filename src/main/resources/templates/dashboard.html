<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

    <div class="container-fluid">

        <span class="navbar-brand">
            Insurance Reminder System
        </span>

        <form th:action="@{/logout}" method="post">

            <button type="submit"
                    class="btn btn-danger">
                Logout
            </button>

        </form>

    </div>

</nav>

<div class="container mt-4">

    <!-- Statistics Cards -->
    <div class="row g-3">

        <div class="col-md-3">

            <div class="card p-3 shadow-sm">

                <h5>Total Policies</h5>

                <h2 th:text="${totalPolicies}">
                    0
                </h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card p-3 shadow-sm">

                <h5>Active</h5>

                <h2 th:text="${activePolicies}">
                    0
                </h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card p-3 shadow-sm">

                <h5>Expired</h5>

                <h2 th:text="${expiredPolicies}">
                    0
                </h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card p-3 shadow-sm">

                <h5>Renewed</h5>

                <h2 th:text="${renewedPolicies}">
                    0
                </h2>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card p-3 shadow-sm">

                <h5>Total Activities</h5>

                <h2 th:text="${activityCount}">
                    0
                </h2>

            </div>

        </div>

    </div>

    <!-- Main Actions -->
    <div class="mt-4">

        <a href="/policies/add"
           class="btn btn-success">

            Add New Policy

        </a>

        <a href="/policies"
           class="btn btn-primary">

            View Policies

        </a>

        <a th:href="@{/policies}"
           class="btn btn-primary me-2">
            Manage Policies
        </a>

        <a th:href="@{/reminders}"
           class="btn btn-warning me-2">
            Reminder History
        </a>

        <a th:href="@{/notifications}"
           class="btn btn-info me-2">
            🔔 Notifications
        </a>

    </div>

    <!-- Reports -->
    <div class="mt-4">

        <a th:href="@{/report/excel}"
           class="btn btn-success me-2">
            Export Excel
        </a>

        <a th:href="@{/report/pdf}"
           class="btn btn-danger">
            Export PDF
        </a>

    </div>

    <!-- Policy Statistics Chart -->
    <div class="mt-5">

        <div class="card shadow-sm">

            <div class="card-header">

                <h5 class="mb-0">
                    Policy Statistics
                </h5>

            </div>

            <div class="card-body">

                <canvas id="policyChart"
                        style="max-height:400px;">
                </canvas>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">

    const activePolicies = [[${activePolicies}]];
    const expiredPolicies = [[${expiredPolicies}]];
    const renewedPolicies = [[${renewedPolicies}]];

    const ctx = document.getElementById('policyChart');

    new Chart(ctx, {

        type: 'pie',

        data: {

            labels: [
                'Active',
                'Expired',
                'Renewed'
            ],

            datasets: [{

                label: 'Policies',

                data: [
                    activePolicies,
                    expiredPolicies,
                    renewedPolicies
                ]

            }]

        },

        options: {

            responsive: true,

            plugins: {

                legend: {
                    position: 'bottom'
                },

                title: {

                    display: true,

                    text: 'Insurance Policy Status Distribution'

                }

            }

        }

    });

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
